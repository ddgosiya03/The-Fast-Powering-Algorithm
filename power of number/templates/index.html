<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Modular Exponentiation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body">
                        <h1 class="card-title text-center mb-4">Fast Modular Exponentiation Calculator</h1>
                        <form id="computeForm">
                            <div class="mb-3">
                                <label for="p" class="form-label">Prime (p):</label>
                                <input type="number" class="form-control" id="p" required>
                            </div>
                            <div class="mb-3">
                                <label for="g" class="form-label">Base (g):</label>
                                <input type="number" class="form-control" id="g" required>
                            </div>
                            <div class="mb-3">
                                <label for="s" class="form-label">Power (s):</label>
                                <input type="number" class="form-control" id="s" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Compute</button>
                        </form>
                        <div id="result" class="mt-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <button id="themeToggle" class="btn btn-secondary position-fixed bottom-0 end-0 m-3">🌙</button>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
